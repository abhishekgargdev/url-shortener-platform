version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: url_shortener_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: url_shortener
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: url_shortener_backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      - DATABASE_URL=mysql://root:root@db:3306/url_shortener
      - PORT=5000
      - JWT_SECRET=supers3cr3t
      - JWT_EXPIRES_IN=7d
    depends_on:
      - db
    # In production, you would run migrations/seeds as a separate init container or command,
    # but for simple compose up we can just start it. Prisma model will need migrations.
    # command: sh -c "npx prisma db push && node src/index.js"

  frontend:
    build:
      context: ./frontend
    container_name: url_shortener_frontend
    restart: always
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  db_data:
